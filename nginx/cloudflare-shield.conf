# ==============================================================================
# 🚪 ACCESS CONTROL LIST (ACL)
# ==============================================================================

# Allow Cloudflare Edge IPv4 blocks
allow 173.245.48.0/20;
allow 103.21.244.0/22;
allow 103.22.200.0/22;
allow 103.31.4.0/22;
allow 141.101.64.0/18;
allow 108.162.192.0/18;
allow 190.93.240.0/20;
allow 188.114.96.0/20;
allow 197.234.240.0/22;
allow 198.41.128.0/17;
allow 162.158.0.0/15;
allow 104.16.0.0/13;
allow 104.24.0.0/14;
allow 172.64.0.0/13;
allow 131.0.72.0/22;

# Allow Cloudflare Edge IPv6 blocks
allow 2400:cb00::/32;
allow 2606:4700::/32;
allow 2803:f800::/32;
allow 2405:b500::/32;
allow 2405:8100::/32;
allow 2a06:98c0::/29;
allow 2c0f:f248::/32;

# 💻 Allow Local and Private Subnets (Essential for local Dev, Healthchecks & internal VPC routing)
allow 127.0.0.1;           # localhost
allow ::1;                 # localhost IPv6
allow 10.0.0.0/8;          # AWS Private Subnets
allow 172.16.0.0/12;       # Docker default bridge network subnet range
allow 192.168.0.0/16;      # Private LAN

# ❌ Deny all other traffic (blocks Direct-to-Origin bypass attempts from the public internet)
deny all;

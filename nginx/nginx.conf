user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main_json escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for"'
    '}';

    access_log /var/log/nginx/access_json.log main_json;

    sendfile on;
    keepalive_timeout 65;

    # 🛡️ Global Security Hardening
    server_tokens off; # Hide Nginx version details

    # 🌐 HTTP (80) -> HTTPS (443) Redirect
    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        # Enforce immediate secure redirect with 301 Moved Permanently
        return 301 https://$host$request_uri;
    }

    # 🔒 HTTPS (443) Server (TLSv1.3 ONLY)
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name localhost;

        # 🔑 SSL Certificates (Mounted in Docker/Production)
        ssl_certificate /etc/nginx/ssl/owasp_lab.crt;
        ssl_certificate_key /etc/nginx/ssl/owasp_lab.key;

        # 🛡️ Strict TLS 1.3 Protocol Enforcement (Disables TLS 1.2, 1.1, 1.0)
        ssl_protocols TLSv1.3;
        
        # 🔑 Secure TLS 1.3 Cipher Suites
        ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
        ssl_prefer_server_ciphers off;

        # 🧠 SSL Session Configuration
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # 🚀 HSTS (HTTP Strict Transport Security) - Enforced at Load Balancer level
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        
        # 🛡️ Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # 🔀 Reverse Proxy to Rust Axum Web App
        location / {
            proxy_pass http://app:8080;
            
            # Preserve headers for application context & logs
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket Support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

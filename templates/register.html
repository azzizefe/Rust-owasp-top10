{% extends "base.html" %}

{% block nav_auth %}
    <li><a href="/login">Giriş Yap</a></li>
{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 2rem auto; width: 100%;">
    <div class="glass-card">
        <h2 style="font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; text-align: center;">Kayıt Ol</h2>
        <p style="color: var(--text-secondary); text-align: center; margin-bottom: 2rem; font-size: 0.95rem;">OWASP Top 10 Security Lab için hesap oluşturun.</p>

        {% if let Some(err) = error %}
            <div class="alert-error">
                <strong>Hata:</strong> {{ err }}
            </div>
        {% endif %}

        <form action="/register" method="POST">
            <label for="username" style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);">Kullanıcı Adı</label>
            <input type="text" id="username" name="username" class="glass-input" placeholder="Kullanıcı adı girin (min 3 karakter)" required autocomplete="username">

            <label for="email" style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);">E-posta Adresi</label>
            <input type="email" id="email" name="email" class="glass-input" placeholder="E-posta adresinizi girin" required autocomplete="email">

            <label for="password" style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);">Şifre</label>
            <input type="password" id="password" name="password" class="glass-input" placeholder="Güçlü bir şifre girin (min 8 karakter)" required autocomplete="new-password">

            <button type="submit" class="btn-primary">Kayıt Ol</button>
        </form>
    </div>
</div>
{% endblock %}

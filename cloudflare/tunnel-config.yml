# ==============================================================================
# 🛡️ CLOUDFLARE ZERO-TRUST TUNNEL CONFIGURATION
# ==============================================================================
# Bu dosya, inbound (gelen) portları genel internete tamamen kapatıp, sunucudan
# dışarıya doğru şifreli bir tünel açarak Cloudflare Edge üzerinden trafiği 
# güvenli bir şekilde almak için kullanılır.

# 🔑 The unique identifier of your Cloudflare Tunnel
# (Tünel oluşturulduğunda bu UUID değeri atanır)
tunnel: ${CLOUDFLARE_TUNNEL_ID}

# 🔑 Path to the credentials file generated by 'cloudflared tunnel create'
credentials-file: /etc/cloudflared/tunnel-credentials.json

# ==============================================================================
# 🔀 INGRESS RULES (Trafik Yönlendirme Kuralları)
# ==============================================================================
ingress:
  # 1. Route all traffic for your production domain to the Nginx service.
  # Nginx, bridge network üzerinde 'nginx:80' adresinde dinlemektedir.
  - hostname: lab.yourdomain.com
    service: http://nginx:80
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  # 2. Match-all rule: Return a 404 for any unmapped hostnames/traffic
  - service: http_status:404

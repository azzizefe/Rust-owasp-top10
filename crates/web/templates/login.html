{% extends "base.html" %}

{% block nav_auth %}
    <li><a href="/register">Kayıt Ol</a></li>
{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 2rem auto; width: 100%;">
    <div class="glass-card">
        <h2 style="font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; text-align: center;">Giriş Yap</h2>
        <p style="color: var(--text-secondary); text-align: center; margin-bottom: 2rem; font-size: 0.95rem;">Lab ortamına güvenli erişim sağlayın.</p>

        {% if let Some(err) = error %}
            <div class="alert-error">
                <strong>Hata:</strong> {{ err }}
            </div>
        {% endif %}

        <form action="/login" method="POST">
            <label for="username" style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);">Kullanıcı Adı</label>
            <input type="text" id="username" name="username" class="glass-input" placeholder="Kullanıcı adınızı girin" required autocomplete="username">

            <label for="password" style="font-size: 0.9rem; font-weight: 500; color: var(--text-secondary);">Şifre</label>
            <input type="password" id="password" name="password" class="glass-input" placeholder="Şifrenizi girin" required autocomplete="current-password">

            <button type="submit" class="btn-primary">Oturum Aç</button>
        </form>
    </div>
</div>
{% endblock %}

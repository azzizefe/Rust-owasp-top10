name: 📦 Software Bill of Materials (SBOM)

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  security-events: write
  actions: read

jobs:
  sbom:
    name: Generate & Verify SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Stable Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: |
          cargo install cargo-cyclonedx || true

      - name: Generate CycloneDX SBOM (JSON)
        # Using workspace, json format, all features, and override output filename
        run: |
          cargo cyclonedx --workspace --format json --all-features --output-cdx sbom.json

      - name: Upload SBOM as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Run OSV-Scanner on SBOM
        uses: google/osv-scanner-action/bootstrap-action@v1
        with:
          args: --sbom=sbom.json

      - name: Upload SBOM to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: sbom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
